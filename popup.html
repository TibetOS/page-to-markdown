<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span { font-size: 18px; }
    #btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #7c3aed;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn:hover { background: #6d28d9; }
    #btn:disabled { background: #444; cursor: default; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
      min-height: 16px;
    }
    .error { color: #f87171; }
    .success { color: #4ade80; }
  </style>
</head>
<body>
  <h1><span>📄</span> Page to Markdown</h1>
  <button id="btn">Extract .md</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
