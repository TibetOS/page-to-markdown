<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page to Markdown — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 28px;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.5;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    h1 span { font-size: 22px; }
    p.lead { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
    fieldset { border: 1px solid #333; border-radius: 10px; padding: 8px 16px; }
    legend { padding: 0 8px; font-size: 13px; font-weight: 600; color: #cbd5e1; }
    .field {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 4px;
      border-bottom: 1px solid #262640;
    }
    .field:last-child { border-bottom: none; }
    .field input { margin-top: 3px; width: 16px; height: 16px; accent-color: #7c3aed; cursor: pointer; }
    .field label { cursor: pointer; }
    .field .name { font-size: 14px; color: #e0e0e0; font-weight: 600; }
    .field .desc { font-size: 12px; color: #8b93a7; }
    code { background: #0f0f1e; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    #saved { margin-top: 16px; font-size: 12px; color: #4ade80; min-height: 16px; }
  </style>
</head>
<body>
  <h1><span>📄</span> Page to Markdown</h1>
  <p class="lead">Choose which fields appear in the YAML front matter of extracted Markdown. Changes apply to future extractions. Everything runs locally — settings sync via your browser account only.</p>

  <fieldset>
    <legend>Front-matter fields</legend>
    <div id="fields"></div>
  </fieldset>

  <div id="saved"></div>

  <script src="shared.js"></script>
  <script src="options.js"></script>
</body>
</html>
