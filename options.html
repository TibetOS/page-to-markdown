<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page to Markdown — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 28px;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.5;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    h1 span { font-size: 22px; }
    p.lead { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
    fieldset { border: 1px solid #333; border-radius: 10px; padding: 8px 16px; }
    legend { padding: 0 8px; font-size: 13px; font-weight: 600; color: #cbd5e1; }
    .field {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 4px;
      border-bottom: 1px solid #262640;
    }
    .field:last-child { border-bottom: none; }
    .field input { margin-top: 3px; width: 16px; height: 16px; accent-color: #7c3aed; cursor: pointer; }
    .field label { cursor: pointer; }
    .field .name { font-size: 14px; color: #e0e0e0; font-weight: 600; }
    .field .desc { font-size: 12px; color: #8b93a7; }
    code { background: #0f0f1e; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    #saved { margin-top: 16px; font-size: 12px; color: #4ade80; min-height: 16px; }
  </style>
</head>
<body>
  <h1><span>📄</span> Page to Markdown</h1>
  <p class="lead">Choose which fields appear in the YAML front matter of extracted Markdown. Changes apply to future extractions. Everything runs locally — settings sync via your browser account only.</p>

  <fieldset>
    <legend>Front-matter fields</legend>
    <div id="fields"></div>
  </fieldset>

  <fieldset style="margin-top: 18px;">
    <legend>Obsidian</legend>
    <div class="field">
      <label for="vault" style="flex: 1;">
        <div class="name">Default vault</div>
        <div class="desc">Optional. Used by <strong>Send to Obsidian</strong>. Leave blank to use your last-focused vault.</div>
        <input type="text" id="vault" placeholder="My Vault"
          style="margin-top: 6px; width: 100%; padding: 8px 10px; border: 1px solid #333; border-radius: 6px; background: #0f0f1e; color: #e0e0e0; font-size: 13px;">
      </label>
    </div>
  </fieldset>

  <fieldset style="margin-top: 18px;">
    <legend>On-device AI (Gemini Nano)</legend>
    <div class="field">
      <input type="checkbox" id="aiSummary">
      <label for="aiSummary">
        <div class="name">Add a TL;DR summary to front matter</div>
        <div class="desc">Uses Chrome's built-in Summarizer — everything runs locally, nothing leaves your device. Only applies when the model is already installed; we never download it without you asking.</div>
      </label>
    </div>
    <div class="field" style="border-bottom: none;">
      <span id="aiStatus" style="font-size: 12px; color: #94a3b8; align-self: center;">Checking availability…</span>
      <button id="downloadModel" hidden style="padding: 8px 14px; border: none; border-radius: 6px; background: #0d9488; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;">Download model</button>
    </div>
  </fieldset>

  <fieldset style="margin-top: 18px;">
    <legend>Webhook</legend>
    <div class="field">
      <label for="webhook" style="flex: 1;">
        <div class="name">Webhook URL</div>
        <div class="desc">Optional. <strong>Send to webhook</strong> POSTs the extracted Markdown as JSON — works with n8n, Zapier, Make, or your own endpoint (Notion via a small proxy). HTTPS only (localhost may use HTTP). Saving asks the browser to grant access to just that site.</div>
        <input type="text" id="webhook" placeholder="https://example.com/hook"
          style="margin-top: 6px; width: 100%; padding: 8px 10px; border: 1px solid #333; border-radius: 6px; background: #0f0f1e; color: #e0e0e0; font-size: 13px;">
      </label>
    </div>
    <div class="field" style="border-bottom: none;">
      <button id="saveWebhook" style="padding: 8px 14px; border: none; border-radius: 6px; background: #7c3aed; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;">Save &amp; grant access</button>
      <span id="webhookStatus" style="font-size: 12px; color: #94a3b8; align-self: center;"></span>
    </div>
  </fieldset>

  <div id="saved"></div>

  <script src="shared.js"></script>
  <script src="options.js"></script>
</body>
</html>
